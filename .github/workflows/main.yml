# Deploy Android App to Play Store

name: Deploy Android App to Play Store

on:
  workflow_dispatch:
    inputs:
      debug_upload:
        description: Debug upload for detailed logs
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SUPPRESS_GCLOUD_PROMPT: '1'
      ACTIONS_STEP_DEBUG: ${{ inputs.debug_upload }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Bump versionCode and versionName
        run: |
          VERSION_CODE=$(grep versionCode app/build.gradle | awk '{ print $2 }')
          VERSION_NAME=$(grep versionName app/build.gradle | awk -F\" '{ print $2 }')
          NEW_VERSION_CODE=$((VERSION_CODE + 1))
          NEW_VERSION_NAME=$(echo $VERSION_NAME | awk -F. -v OFS=. '{$NF++;print}')
          sed -i "s/versionCode $VERSION_CODE/versionCode $NEW_VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"$VERSION_NAME\"/versionName \"$NEW_VERSION_NAME\"/" app/build.gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build App Bundle
        run: ./gradlew bundleRelease

      - name: Validate Play Store secret
        env:
          SA_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT secret is not set."
            exit 1
          fi
          printf '%s' "$SA_JSON" > sa.json
          if ! python3 -c "import json; json.load(open('sa.json'))"; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT is not valid JSON. Paste the full key as one line (no newlines)."
            exit 1
          fi
          if [ "$(wc -l < sa.json)" -gt 1 ]; then
            echo "::warning::Secret contains newlines. Store it as a single-line JSON string to avoid 'Unknown error' (Settings → Secrets → edit and minify)."
          fi
          python3 -c "import json; d=json.load(open('sa.json')); print('Service account:', d.get('client_email','?'))"
          rm -f sa.json

      - name: Upload to Play Store
        uses: Wandalen/wretry.action@v1.6.16
        with:
          action: r0adkll/upload-google-play@v1
          attempt_limit: 5
          attempt_delay: 10000
          with: |
            serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
            packageName: com.gtxtreme.pct
            releaseFiles: app/build/outputs/bundle/release/app-release.aab
            track: production
